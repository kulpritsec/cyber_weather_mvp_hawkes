version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyber_weather
      POSTGRES_USER: cyberweather
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberweather"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      CYBER_WEATHER_DATABASE_URL: postgresql://cyberweather:${DB_PASSWORD:-changeme}@db:5432/cyber_weather
      CYBER_WEATHER_ENV: production
      CYBER_WEATHER_CORS_ORIGINS: "http://localhost,http://localhost:80"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        python -c 'from app.db import Base, engine; Base.metadata.create_all(bind=engine)' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  worker:
    build: ./backend
    environment:
      CYBER_WEATHER_DATABASE_URL: postgresql://cyberweather:${DB_PASSWORD:-changeme}@db:5432/cyber_weather
      CYBER_WEATHER_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Seeding data...' &&
        python -c 'from app.db import Base, engine; Base.metadata.create_all(bind=engine)' &&
        python -m app.ingest.generate_synthetic --hours 24 --rate 1200 &&
        echo 'Seed complete.'
      "
    restart: "no"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
