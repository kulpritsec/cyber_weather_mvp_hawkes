
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyber_weather
      POSTGRES_USER: cyberweather
      POSTGRES_PASSWORD: ${CYBER_WEATHER_DB_PASSWORD}

    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberweather"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    environment:
      CYBER_WEATHER_DB_URL: postgresql://cyberweather:${CYBER_WEATHER_DB_PASSWORD}@db:5432/cyber_weather
      CYBER_WEATHER_ENV: production
      CYBER_WEATHER_CORS_ORIGINS: "https://weather.kulpritstudios.com"
      CYBER_WEATHER_GREYNOISE_API_KEY: ${CYBER_WEATHER_GREYNOISE_API_KEY}
      CYBER_WEATHER_ABUSECH_AUTH_KEY: ${CYBER_WEATHER_ABUSECH_AUTH_KEY}
      CYBER_WEATHER_OTX_API_KEY: ${CYBER_WEATHER_OTX_API_KEY}
      CYBER_WEATHER_ABUSEIPDB_API_KEY: ${CYBER_WEATHER_ABUSEIPDB_API_KEY}
      VT_API_KEY: ${VT_API_KEY}
      CYBER_WEATHER_MAXMIND_DB_PATH: /data/GeoLite2-City.mmdb

    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
     - /home/deploy/cyber-weather/data:/data

    command: >
      sh -c "
        python -c 'from app.db import Base, engine; Base.metadata.create_all(bind=engine)' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

#   worker:
#     build: ./backend
#     environment:
#       CYBER_WEATHER_DB_URL: postgresql://cyberweather:${CYBER_WEATHER_DB_PASSWORD}@db:5432/cyber_weather
#       CYBER_WEATHER_ENV: production
#     depends_on:
#       db:
#         condition: service_healthy
#     command: >
#       sh -c "
#         echo 'Seeding data...' &&
#         python -c 'from app.db import Base, engine; Base.metadata.create_all(bind=engine)' &&
#         python -m app.ingest.generate_synthetic --hours 24 --rate 1200 &&
#         echo 'Seed complete.'
#       "
#     restart: "no"
# 
  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

  alchemy:
    build:
      context: /home/deploy/MITRE_ALCHEMY
      target: api
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      ALCHEMY_LOG_LEVEL: INFO
      ALCHEMY_CORS_ORIGINS: "https://weather.kulpritstudios.com"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
